<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-For-Beginners Progress Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .progress-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .progress-bar {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .progress-bar-label {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }
        
        .bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }
        
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        .lessons-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .module {
            border-bottom: 1px solid #e0e0e0;
        }
        
        .module:last-child {
            border-bottom: none;
        }
        
        .module-header {
            background: #f5f5f5;
            padding: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
        }
        
        .module-header:hover {
            background: #efefef;
        }
        
        .module-header h2 {
            color: #333;
            font-size: 1.3em;
            margin: 0;
        }
        
        .module-toggle {
            color: #667eea;
            font-size: 1.5em;
            transition: transform 0.3s;
        }
        
        .module.collapsed .module-toggle {
            transform: rotate(-90deg);
        }
        
        .module-content {
            padding: 0;
            max-height: 2000px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .module.collapsed .module-content {
            max-height: 0;
        }
        
        .lesson {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: background 0.2s;
        }
        
        .lesson:hover {
            background: #fafafa;
        }
        
        .lesson input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin-top: 3px;
            cursor: pointer;
            accent-color: #667eea;
        }
        
        .lesson-info {
            flex: 1;
        }
        
        .lesson-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 1.05em;
        }
        
        .lesson.completed .lesson-title {
            color: #999;
            text-decoration: line-through;
        }
        
        .lesson-date {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 5px;
        }
        
        .lesson-notes {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }
        
        .lesson input[type="text"] {
            width: 100%;
            padding: 5px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 0.85em;
            margin-top: 5px;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .status-completed {
            background: #4caf50;
            color: white;
        }
        
        .status-pending {
            background: #ff9800;
            color: white;
        }
        
        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 AI-For-Beginners Progress Tracker</h1>
            <p>Microsoft's 24-lesson AI curriculum - Track your learning journey</p>
            
            <div class="progress-stats">
                <div class="stat-box">
                    <div class="stat-number" id="completedCount">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalCount">24</div>
                    <div class="stat-label">Total Lessons</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="progressPercent">0%</div>
                    <div class="stat-label">Progress</div>
                </div>
            </div>
            
            <div class="progress-bar" style="margin-top: 20px;">
                <div class="progress-bar-label">Overall Progress</div>
                <div class="bar">
                    <div class="bar-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
        </div>
        
        <div class="lessons-container" id="lessonsContainer"></div>
        
        <div class="buttons">
            <button class="btn-primary" onclick="expandAll()">📂 Expand All</button>
            <button class="btn-secondary" onclick="collapseAll()">📁 Collapse All</button>
            <button class="btn-primary" onclick="resetProgress()">🔄 Reset Progress</button>
        </div>
        
        <div class="footer">
            <p>💾 Your progress is automatically saved to your browser</p>
            <p>Start date: April 14, 2026</p>
        </div>
    </div>
    
    <script>
        const lessons = {
            "Module 0: Course Setup": [
                "Course Setup & Development Environment"
            ],
            "Module I: Introduction to AI": [
                "Introduction and History of AI"
            ],
            "Module II: Symbolic AI": [
                "Knowledge Representation and Expert Systems"
            ],
            "Module III: Neural Networks": [
                "Perceptron",
                "Multi-Layered Perceptron and Creating Your Own Framework",
                "Introduction to Frameworks (PyTorch/TensorFlow) and Overfitting"
            ],
            "Module IV: Computer Vision": [
                "Intro to Computer Vision & OpenCV",
                "Convolutional Neural Networks & CNN Architectures",
                "Pre-trained Networks and Transfer Learning",
                "Autoencoders and VAEs",
                "Generative Adversarial Networks & Artistic Style Transfer",
                "Object Detection"
            ],
            "Module V: Natural Language Processing": [
                "Understanding Recurrent Neural Networks",
                "Attention and Transformers",
                "Semantic Understanding and Word Embeddings",
                "Language Models, GPT, and BERT",
                "Named Entity Recognition"
            ],
            "Module VI: Other AI Approaches": [
                "Generative Models",
                "Reinforcement Learning",
                "Multi-Agent Systems"
            ],
            "Module VII: Ethics in AI": [
                "Ethics and Responsible AI",
                "Environmental Impact of AI",
                "Law, Policy and Ethics",
                "Safety and Security in AI"
            ],
            "Module X: Extras": [
                "Genetic Algorithms",
                "Quantum Computing for AI"
            ]
        };
        
        function initializeTracker() {
            const container = document.getElementById('lessonsContainer');
            
            Object.keys(lessons).forEach(moduleName => {
                const moduleDiv = document.createElement('div');
                moduleDiv.className = 'module';
                moduleDiv.id = `module-${moduleName.replace(/\s+/g, '-')}`;
                
                const moduleHeader = document.createElement('div');
                moduleHeader.className = 'module-header';
                moduleHeader.onclick = () => toggleModule(moduleDiv);
                
                const headerText = document.createElement('h2');
                headerText.textContent = moduleName;
                
                const toggle = document.createElement('span');
                toggle.className = 'module-toggle';
                toggle.textContent = '▼';
                
                moduleHeader.appendChild(headerText);
                moduleHeader.appendChild(toggle);
                
                const moduleContent = document.createElement('div');
                moduleContent.className = 'module-content';
                
                lessons[moduleName].forEach((lesson, index) => {
                    const lessonDiv = document.createElement('div');
                    lessonDiv.className = 'lesson';
                    const lessonId = `${moduleName}-${index}`;
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = lessonId;
                    checkbox.onchange = () => updateProgress();
                    
                    // Load saved state
                    const saved = localStorage.getItem(lessonId);
                    if (saved === 'true') {
                        checkbox.checked = true;
                        lessonDiv.classList.add('completed');
                    }
                    
                    const lessonInfo = document.createElement('div');
                    lessonInfo.className = 'lesson-info';
                    
                    const title = document.createElement('div');
                    title.className = 'lesson-title';
                    title.textContent = `Lesson ${index + 1}: ${lesson}`;
                    
                    const notes = document.createElement('input');
                    notes.type = 'text';
                    notes.placeholder = 'Add notes (optional)...';
                    notes.id = `notes-${lessonId}`;
                    notes.onchange = () => saveNotes(notes.id);
                    
                    // Load saved notes
                    const savedNotes = localStorage.getItem(`notes-${lessonId}`);
                    if (savedNotes) {
                        notes.value = savedNotes;
                    }
                    
                    lessonInfo.appendChild(title);
                    lessonInfo.appendChild(notes);
                    
                    lessonDiv.appendChild(checkbox);
                    lessonDiv.appendChild(lessonInfo);
                    
                    checkbox.addEventListener('change', () => {
                        if (checkbox.checked) {
                            lessonDiv.classList.add('completed');
                        } else {
                            lessonDiv.classList.remove('completed');
                        }
                        saveProgress();
                    });
                    
                    moduleContent.appendChild(lessonDiv);
                });
                
                moduleDiv.appendChild(moduleHeader);
                moduleDiv.appendChild(moduleContent);
                container.appendChild(moduleDiv);
            });
        }
        
        function toggleModule(moduleDiv) {
            moduleDiv.classList.toggle('collapsed');
        }
        
        function expandAll() {
            document.querySelectorAll('.module').forEach(module => {
                module.classList.remove('collapsed');
            });
        }
        
        function collapseAll() {
            document.querySelectorAll('.module').forEach(module => {
                module.classList.add('collapsed');
            });
        }
        
        function saveProgress() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                localStorage.setItem(checkbox.id, checkbox.checked);
            });
            updateProgress();
        }
        
        function saveNotes(noteId) {
            const notes = document.getElementById(noteId);
            localStorage.setItem(noteId, notes.value);
        }
        
        function updateProgress() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const completed = Array.from(checkboxes).filter(cb => cb.checked).length;
            const total = checkboxes.length;
            const percentage = Math.round((completed / total) * 100);
            
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('progressPercent').textContent = percentage + '%';
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressFill').textContent = percentage + '%';
        }
        
        function resetProgress() {
            if (confirm('Are you sure you want to reset all progress? This cannot be undone.')) {
                localStorage.clear();
                location.reload();
            }
        }
        
        // Initialize on page load
        window.addEventListener('DOMContentLoaded', () => {
            initializeTracker();
            updateProgress();
        });
    </script>
</body>
</html>
